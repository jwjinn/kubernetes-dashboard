name: Build and Publish Docker Images

on:
  push:
    branches: [ "master", "main" ]
    # 이 워크플로우는 아래 경로에 변경 사항이 있을 때만 트리거됩니다.
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'

env:
  REGISTRY: ghcr.io # GitHub Container Registry 사용 (Docker Hub 사용 시 docker.io 로 변경)

jobs:
  # 1. 어떤 디렉토리가 변경되었는지 감지하는 Job
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # dorny/paths-filter를 사용하여 변경된 폴더를 정확히 감지합니다.
      - name: Check paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # 2. Frontend 빌드 및 푸시 (frontend 폴더가 변경되었을 때만 실행)
  build-frontend:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    # GitHub Container Registry(GHCR)에 푸시하기 위한 권한 부여
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 소문자로 변환된 저장소 이름을 사용합니다. (예: ghcr.io/jwjinn/kubernetes-dashboard-frontend)
          images: ${{ env.REGISTRY }}/${{ github.repository }}-frontend

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 3. Backend 빌드 및 푸시 (backend 폴더가 변경되었을 때만 실행)
  build-backend:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
