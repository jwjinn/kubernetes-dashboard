apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: npu_dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      serviceAccountName: dashboard-backend
      containers:
        - name: backend
          image: ghcr.io/jwjinn/kubernetes-dashboard-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: dashboard-backend-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: npu_dashboard
spec:
  type: ClusterIP
  selector:
    app: dashboard-backend
  ports:
    - name: http
      port: 8081
      targetPort: http
