apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-frontend-runtime
  namespace: npu_dashboard
data:
  env-config.js: |
    window._env_ = {
      VITE_OIDC_AUTHORITY: "http://192.168.160.69:30080/realms/dashboard-realm",
      VITE_OIDC_CLIENT_ID: "dashboard-client",
      VITE_OIDC_REDIRECT_PATH: "/dashboard",
      VITE_OIDC_POST_LOGOUT_REDIRECT_PATH: "/login",
      VITE_ACCELERATOR_TYPE: "NPU"
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-frontend-nginx
  namespace: npu_dashboard
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html index.htm;

      location /api/ {
        proxy_pass http://dashboard-backend.npu_dashboard.svc.cluster.local:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
