apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: npu_dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/jwjinn/kubernetes-dashboard-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/env-config.js
              subPath: env-config.js
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: runtime-config
          configMap:
            name: dashboard-frontend-runtime
        - name: nginx-config
          configMap:
            name: dashboard-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: npu_dashboard
spec:
  type: NodePort
  selector:
    app: dashboard-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30000
